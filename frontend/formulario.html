<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/nube.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/morph.css">
    <link rel="stylesheet" href="./css/estilos.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./js/formulario.js"></script>

    <title>Formulario Registro</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="./listado.html">Listado</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./formulario.html">Formulario Regisro</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <br>

    <div class="container">
        <div class="row col">
            <div class="alert alert-danger" role="alert" id="errorFormulario">
                <p>Revise los siguientes errores en su formulario:</p>
                <ul id="listaErrores"></ul>
            </div>
        </div>
        <br>

        <form>
            <p class="h1">Formulario de Registro</p>
            <hr>

            <div class="container">
                <div class="row">
                    <div class="col">
                        <label for="input_nombre" class="form-label">Nombre Usuario:</label>
                        <input class="form-control" type="text" name="input_nombre" id="input_nombre"
                            placeholder="Ingrese su nombre" onchange="validarElemento(this)">
                    </div>
                    <div class="col">
                        <label for="input_correo" class="form-label">Correo Electrónico:</label>
                        <input class="form-control" type="email" name="input_correo" id="input_correo"
                            placeholder="Ingrese su nombre" onchange="validarCampoCorreo(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="input_contrasena" class="form-label">Contraseña:</label>
                        <input type="password" class="form-control" name="input_contrasena" id="input_contrasena"
                            onchange="validarCampoContrasena(this)">
                    </div>
                    <div class="col">
                        <label for="input_repetir_contrasena" class="form-label">Repetir Contraseña:</label>
                        <input type="password" class="form-control" name="input_repetir_contrasena"
                            id="input_rep_contrasena" onchange="validarCampoRepetirContrasena(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label class="form-label" for="selectGenero">Género:</label>
                        <select class="form-select" aria-label="Default select example" id="selectGenero"
                            onchange="validarElemento(this)">
                            <option selected value="">Seleccione su Género</option>
                            <option value="masc">Masculino</option>
                            <option value="fem">Femenino</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="col">
                        <label for="inputNacimiento" class="form-label">Fecha de Nacimiento:</label>
                        <input type="date" class="form-control" name="fechaNacimiento" id="inputNacimiento"
                            onchange="validarElemento(this)">
                    </div>
                </div>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputFoto" class="form-label">Foto Personal:</label>
                        <input type="file" class="form-control" name="" id="inputFoto">
                    </div>
                </div>
                <br>
                <hr>

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <button type="button" class="btn btn-secondary me-2">Cancelar</button>
                        <button type="button" class="btn btn-primary" onclick="validarFormulario()">Aceptar</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
